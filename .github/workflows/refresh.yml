name: Refresh dashboard

# Build today's slate twice a day so the dashboard catches both the
# matinee lineups (10:30 AM ET) and the night-game lineups (4:00 PM ET).
# Crons are in UTC. During EDT the times are exact; during EST they shift
# back by an hour (which is fine — MLB season is mostly EDT anyway).
#
#   14:30 UTC = 10:30 AM EDT / 9:30 AM EST  → matinees + line settle
#   20:00 UTC = 4:00 PM EDT  / 3:00 PM EST  → night-game lineups + line moves
#
# Adjust either cron as you like; the manual trigger is always available.

on:
  schedule:
    - cron: "30 14 * * *"
    - cron: "0 20 * * *"
  workflow_dispatch: {}    # manual trigger from the Actions tab

permissions:
  contents: write          # needed for the bot to commit output/

concurrency:
  group: refresh-dashboard
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      STATIC_MODE: "1"
      TZ: America/New_York

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Settle yesterday first so the dashboard's Recent Results section is
      # current. Use continue-on-error: a missing CSV (e.g. day after we
      # first deploy) shouldn't fail the whole run.
      - name: Settle yesterday
        run: python -m bets.settle
        continue-on-error: true

      - name: Project today's pitchers
        run: python -m bets.main

      - name: Project today's hitters
        run: python -m bets.hitters
        continue-on-error: true   # lineups may not be posted yet

      - name: Regenerate dashboard
        run: python -m bets.web

      - name: Commit and push regenerated output/
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add output/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "refresh: $(date -u +%Y-%m-%d) data"
            git push
          fi
