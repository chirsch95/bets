# Netlify serves a thin HTML+JS shell. The browser fetches CSV data
# directly from raw.githubusercontent.com on each page load, so committing
# new CSV data does NOT need to redeploy. Only re-deploy when the shell
# itself (output/index.html) changes — i.e. when we ship code/UI changes.
#
# Exit code 0 from the ignore command = skip; non-zero = deploy.

[build]
  publish = "output"
  command = ""
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- output/index.html"

# Cache index.html for 5 minutes — short enough that the daily refresh shows
# up quickly, long enough to absorb burst traffic without re-fetching every
# request. CSVs aren't served by the public site so no header needed.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=300"
